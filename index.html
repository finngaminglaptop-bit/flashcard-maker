<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>
<style>
:root{--bg:#141412;--surface:#1e1e1b;--surface-raised:#272724;--border:#2e2e2b;--border-strong:#3e3e3a;--text:#f0ede8;--text-2:#a8a59f;--text-3:#6a6865;--accent:#3b82f6;--accent-bg:rgba(59,130,246,.15);--accent-text:#93c5fd;--danger:#f87171;--danger-bg:rgba(248,113,113,.12);--danger-border:#7f1d1d;--danger-text:#fca5a5;--warning:#fbbf24;--warning-bg:rgba(251,191,36,.12);--warning-border:#78350f;--warning-text:#fcd34d;--success:#4ade80;--success-bg:rgba(74,222,128,.12);--success-border:#14532d;--success-text:#86efac;--radius:8px;--radius-lg:12px}
[data-theme=light]{--bg:#f5f5f4;--surface:#fff;--surface-raised:#fff;--border:#e5e3de;--border-strong:#cccac4;--text:#1a1a18;--text-2:#5a5955;--text-3:#9a9894;--accent:#2563eb;--accent-bg:#eff6ff;--accent-text:#1d4ed8;--danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fca5a5;--danger-text:#b91c1c;--warning:#d97706;--warning-bg:#fffbeb;--warning-border:#fcd34d;--warning-text:#92400e;--success:#16a34a;--success-bg:#f0fdf4;--success-border:#86efac;--success-text:#15803d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--text);min-height:100vh}
.nav{display:flex;align-items:center;border-bottom:1px solid var(--border);padding:0 24px;height:48px;background:var(--surface);position:sticky;top:0;z-index:10}
.nav-logo{font-size:15px;font-weight:600;color:var(--text);margin-right:20px;display:flex;align-items:center;gap:7px;user-select:none}
.nav-tab{padding:0 16px;height:48px;display:flex;align-items:center;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;font-family:inherit}
.nav-tab.on{color:var(--text);border-bottom-color:var(--text)}
.nav-tab:hover:not(.on){color:var(--text-2)}
.nav-spacer{flex:1}
.nav-count{font-size:12px;color:var(--text-3);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px}
.nav-icon-btn{width:34px;height:34px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-raised);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);margin-left:8px;transition:background .1s,color .1s}
.nav-icon-btn:hover{background:var(--bg);color:var(--text)}
.page{display:none}.page.active{display:block}
.deck-page{max-width:800px;margin:0 auto;padding:28px 24px;display:flex;flex-direction:column;gap:16px}
.deck-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:150px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);width:15px;height:15px;pointer-events:none}
.search-wrap input{width:100%;padding:8px 10px 8px 32px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit}
.search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.search-wrap input::placeholder{color:var(--text-3)}
.tb-btn{padding:8px 14px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;background:var(--surface);color:var(--text);display:flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;transition:background .1s}
.tb-btn:hover{background:var(--bg)}.tb-btn.primary{background:var(--text);color:var(--surface);border-color:transparent}.tb-btn.primary:hover{opacity:.88}.tb-btn:active{transform:scale(.97)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.decks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.deck-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:border-color .15s,background .1s;position:relative}
.deck-card:hover{border-color:var(--border-strong);background:var(--surface-raised)}
.deck-card-name{font-size:14px;font-weight:600;margin-bottom:3px;padding-right:22px}
.deck-card-count{font-size:12px;color:var(--text-3)}
.deck-card-del{position:absolute;top:10px;right:10px;width:22px;height:22px;border:none;background:none;cursor:pointer;color:var(--text-3);border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s}
.deck-card:hover .deck-card-del{opacity:1}.deck-card-del:hover{color:var(--danger-text);background:var(--danger-bg)}
.no-decks{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;text-align:center;color:var(--text-3);font-size:13px;line-height:1.6}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-head{display:grid;grid-template-columns:24px 1fr 1fr 56px;background:var(--bg);border-bottom:1px solid var(--border);padding:0 10px}
.th{padding:9px 6px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3)}
.tr{display:grid;grid-template-columns:24px 1fr 1fr 56px;align-items:center;border-bottom:1px solid var(--border);padding:0 10px;transition:background .1s}
.tr:last-child{border-bottom:none}.tr:hover{background:var(--bg)}
.tr input{font-size:13px;padding:8px 6px;background:transparent;border:none;color:var(--text);width:100%;min-width:0;font-family:inherit}
.tr input:focus{outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px;background:var(--surface)}.tr input::placeholder{color:var(--text-3)}
.score-dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong)}
.row-acts{display:flex;gap:2px;justify-content:flex-end;opacity:0;transition:opacity .1s}.tr:hover .row-acts{opacity:1}
.icon-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:var(--text-3);border-radius:6px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--danger-bg);color:var(--danger-text)}
.add-row-btn{display:flex;align-items:center;gap:7px;padding:10px 16px;cursor:pointer;color:var(--text-3);font-size:13px;border:none;background:var(--bg);width:100%;border-top:1px solid var(--border);font-family:inherit;transition:color .1s}
.add-row-btn:hover{color:var(--text)}
.col-name-inp{width:100%;padding:8px 6px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:none;color:var(--text-3);font-family:inherit;cursor:text}
.col-name-inp:focus{outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px;background:var(--surface);color:var(--text);text-transform:none;letter-spacing:0;font-weight:400}
.col-name-inp::placeholder{color:var(--text-3)}
.paste-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.paste-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.paste-head span{font-size:14px;font-weight:500}
.paste-hint{font-size:12px;color:var(--text-2);padding:10px 16px 4px;line-height:1.6}
.paste-hint code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-size:11px}
.paste-body{display:flex;gap:10px;padding:10px 16px 16px}
.paste-body textarea{flex:1;font-size:13px;font-family:monospace;resize:vertical;min-height:90px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg);color:var(--text);padding:8px 10px}
.paste-body textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}.paste-body textarea::placeholder{color:var(--text-3)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;width:430px;max-width:calc(100vw - 32px)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:6px}.modal p{font-size:13px;color:var(--text-2);margin-bottom:16px;line-height:1.6}
.modal input,.modal textarea{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;margin-bottom:12px}
.modal input:focus,.modal textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-code{background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius);padding:12px 14px;font-size:12px;font-family:monospace;word-break:break-all;line-height:1.5;color:var(--text);margin-bottom:8px;max-height:130px;overflow-y:auto}
.copy-hint{font-size:12px;color:var(--success-text);min-height:18px;margin-bottom:8px}
.study-outer{min-height:calc(100vh - 49px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:20px}
.study-controls{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.tog{display:flex;border:1px solid var(--border-strong);border-radius:var(--radius);overflow:hidden}
.tog-btn{padding:6px 13px;font-size:12px;border:none;cursor:pointer;background:transparent;color:var(--text-2);display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .1s}
.tog-btn.on{background:var(--text);color:var(--surface)}.tog-btn:not(.on):hover{background:var(--bg)}
.ctrl-r{display:flex;gap:6px;align-items:center}
.sm-btn{padding:6px 11px;font-size:12px;border:1px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;background:var(--surface);color:var(--text-2);display:flex;align-items:center;gap:5px;font-family:inherit}
.sm-btn:hover{color:var(--text);background:var(--bg)}
.prog{font-size:12px;color:var(--text-3);white-space:nowrap;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.card-area{width:100%;max-width:520px;perspective:1000px;cursor:pointer}
.card-wrap{width:100%;height:180px;position:relative;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1)}
.card-wrap.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;text-align:center;user-select:none}
.face.back{transform:rotateY(180deg)}
.face-tag{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.face-word{font-size:32px;font-weight:600;color:var(--text);line-height:1.2}
.face-hint{font-size:12px;color:var(--text-3);margin-top:14px}
.type-area{width:100%;max-width:520px;display:flex;gap:8px}
.type-in{flex:1;font-size:15px;padding:10px 13px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:inherit;transition:border-color .15s,box-shadow .15s}
.type-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}
.type-in.ok{border-color:var(--success);background:var(--success-bg)}.type-in.no{border-color:var(--danger);background:var(--danger-bg)}
.type-chk{padding:10px 16px;font-size:13px;border:1px solid var(--border-strong);border-radius:var(--radius);cursor:pointer;background:var(--surface);color:var(--text);font-family:inherit;display:flex;align-items:center;gap:5px}
.type-chk:hover{background:var(--bg)}
.type-fb{width:100%;max-width:520px;font-size:13px;min-height:20px}
.rating-row{width:100%;max-width:520px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.rb{padding:12px 8px;border-radius:var(--radius);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;border:1px solid;font-family:inherit;transition:filter .1s,transform .1s}
.rb:active{transform:scale(.97)}.rb-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.rb-bad{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger-text)}
.rb-ok{background:var(--warning-bg);border-color:var(--warning-border);color:var(--warning-text)}
.rb-good{background:var(--success-bg);border-color:var(--success-border);color:var(--success-text)}
.rb:hover{filter:brightness(1.15)}
.pending-msg{font-size:13px;color:var(--text-3);text-align:center;height:62px;display:flex;align-items:center;justify-content:center}
.legend{font-size:11px;color:var(--text-3);display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.legend span{display:flex;align-items:center;gap:4px}.ldot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;width:100%;max-width:520px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border-strong);transition:background .15s}
.dot.cur{background:var(--text);transform:scale(1.25)}.dot.s-good{background:var(--success)}.dot.s-ok{background:var(--warning)}.dot.s-bad{background:var(--danger)}
.finish{text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;padding:20px 0}
.finish h3{font-size:20px;font-weight:600}.finish p{font-size:13px;color:var(--text-2);max-width:320px;line-height:1.6}
.stats-g{display:grid;grid-template-columns:repeat(3,90px);gap:10px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 8px;text-align:center}
.stat-n{font-size:24px;font-weight:600}.stat-l{font-size:11px;color:var(--text-3);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.big-btn{padding:11px 28px;font-size:14px;border-radius:var(--radius);cursor:pointer;background:var(--text);color:var(--surface);border:none;font-family:inherit;font-weight:500;display:flex;align-items:center;gap:7px}
.big-btn:hover{opacity:.88}
.empty-study{text-align:center;color:var(--text-3);padding:40px 20px}
.empty-study svg{width:40px;height:40px;display:block;margin:0 auto 14px;color:var(--border-strong)}
.empty-study p{font-size:14px;line-height:1.7;color:var(--text-2)}
.lnk{color:var(--accent-text);cursor:pointer;text-decoration:underline;background:none;border:none;font:inherit}
</style>
</head>
<body data-theme="dark">
<nav class="nav">
  <div class="nav-logo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="8" height="11" rx="1"/><rect x="14" y="3" width="8" height="11" rx="1"/><path d="M6 17h12M9 21h6"/></svg>
    <span id="logo-text"></span>
  </div>
  <button class="nav-tab on" id="tab-deck" onclick="showPage('deck')"></button>
  <button class="nav-tab" id="tab-study" onclick="showPage('study')"></button>
  <div class="nav-spacer"></div>
  <span class="nav-count" id="nav-count"></span>
  <button class="nav-icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">
    <svg id="ti-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="ti-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</nav>
<div class="page active" id="page-deck">
  <div class="deck-page">
    <div class="deck-toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-inp" oninput="renderTable()">
      </div>
      <button class="tb-btn" onclick="togglePaste()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg><span id="lbl-paste"></span></button>
      <button class="tb-btn" onclick="showShareModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg><span id="lbl-share"></span></button>
      <button class="tb-btn" onclick="showImportModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span id="lbl-importcode"></span></button>
      <button class="tb-btn primary" onclick="showPage('study')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg><span id="lbl-study"></span></button>
    </div>
    <div>
      <div class="section-header">
        <span class="section-title" id="lbl-saved-decks"></span>
        <div style="display:flex;gap:6px">
        <button class="tb-btn" onclick="showSaveModal()" style="padding:5px 10px;font-size:12px"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg><span id="lbl-save"></span></button>
        <button id="reset-btn" class="tb-btn" onclick="resetProgress()" style="padding:5px 10px;font-size:12px;display:none;color:var(--danger-text);border-color:var(--danger-border);background:var(--danger-bg)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg><span id="lbl-reset"></span></button>
      </div>
      </div>
      <div id="decks-list"></div>
    </div>
    <div>
      <div class="section-header"><span class="section-title" id="lbl-current-deck"></span></div>
      <div class="table-wrap">
        <div class="table-head" style="grid-template-columns:24px 1fr 1fr 56px">
          <div class="th"></div>
          <div class="th" style="padding:0"><input id="col-a-inp" class="col-name-inp" placeholder="Side A" oninput="onColNameChange()" /></div>
          <div class="th" style="padding:0"><input id="col-b-inp" class="col-name-inp" placeholder="Side B" oninput="onColNameChange()" /></div>
          <div class="th"></div>
        </div>
        <div id="table-body"></div>
        <button class="add-row-btn" onclick="addCard()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span id="lbl-add"></span></button>
      </div>
    </div>
    <div class="paste-panel" id="paste-panel" style="display:none">
      <div class="paste-head"><span id="lbl-paste-title"></span><button class="icon-btn" onclick="togglePaste()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
      <div class="paste-hint" id="lbl-paste-hint"></div>
      <div class="paste-body"><textarea id="paste-ta" rows="5"></textarea><button class="tb-btn primary" onclick="doImport()" id="lbl-import-btn"></button></div>
    </div>

let db=null,fsDoc=null,fsSetDoc=null,fsGetDoc=null,fsServerTimestamp=null;
const cloudReady=(async()=>{
  try{
    const{initializeApp}=await import('https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js');
    const{getFirestore,doc,setDoc,getDoc,serverTimestamp}=await import('https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js');
    const app=initializeApp(firebaseConfig);
    db=getFirestore(app);fsDoc=doc;fsSetDoc=setDoc;fsGetDoc=getDoc;fsServerTimestamp=serverTimestamp;
    return true;
  }catch(e){console.error('Firebase init failed',e);return false;}
})();
function genId(len=8){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let s='';for(let i=0;i<len;i++)s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
async function saveDeckToCloud(){
  await cloudReady;
  if(!db)throw new Error('cloud unavailable');
  const id=genId();
  await fsSetDoc(fsDoc(db,'decks',id),{
    cards:valid(),
    colA:colA||'',
    colB:colB||'',
    createdAt:fsServerTimestamp()
  });
  return id;
}
async function loadDeckFromCloud(id){
  await cloudReady;
  if(!db)return null;
  const snap=await fsGetDoc(fsDoc(db,'decks',id));
  if(!snap.exists())return null;
  const d=snap.data();
  if(!Array.isArray(d.cards)||!d.cards.length)return null;
  return{cards:d.cards,colA:d.colA||'',colB:d.colB||''};
}
function buildShareUrl(id){return location.origin+location.pathname+'?deck='+id;}
function extractCloudId(raw){
  const m=raw.match(/[?&]deck=([A-Za-z0-9]{6,10})/);
  if(m)return m[1];
  if(/^[A-Za-z0-9]{6,10}$/.test(raw))return raw;
  return null;
}
async function maybeLoadSharedDeckFromURL(){
  const id=new URLSearchParams(location.search).get('deck');
  if(!id)return;
  window.history.replaceState({},'',location.pathname);
  try{
    const data=await loadDeckFromCloud(id);
    if(data){applyImportedDeck(data.cards,data.colA,data.colB);showPage('deck');showToast(T.copied||'Loaded!');}
  }catch(e){}
}

function detectLangCode(name){return LANG_NAME_MAP[name.trim().toLowerCase()]||null;}

let colA='',colB='';
let translateDebounce=null;
let lastTranslateA='',lastTranslateB='';

function onColNameChange(){
  colA=document.getElementById('col-a-inp').value;
  colB=document.getElementById('col-b-inp').value;
  clearTimeout(translateDebounce);
  translateDebounce=setTimeout(tryAutoTranslate,800);
  updateDirLabels();
}
function updateDirLabels(){
  const a=getColA();const b=getColB();
  const ab=document.getElementById('dir-ab-btn');
  const ba=document.getElementById('dir-ba-btn');
  if(ab)ab.textContent=a+' → '+b;
  if(ba)ba.textContent=b+' → '+a;
}
async function tryAutoTranslate(){
  const a=colA.trim();const b=colB.trim();
  if(!a||!b)return;
  if(a===lastTranslateA&&b===lastTranslateB)return;
  const srcCode=detectLangCode(a);const tgtCode=detectLangCode(b);
  if(!srcCode||!tgtCode||srcCode===tgtCode)return;
  lastTranslateA=a;lastTranslateB=b;
  const toTranslate=cards.filter(c=>c.a.trim()&&!c.b.trim());
  if(!toTranslate.length)return;
  showToast(T.translating||'Translating…');
  for(const c of toTranslate){
    try{const result=await translateWord(c.a.trim(),srcCode,tgtCode);if(result)c.b=result;}catch(e){}
  }
  renderTable();showToast(T.translated||'Done!',1500);
}
async function translateWord(word,src,tgt){
  const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=${src}|${tgt}`);
  if(!r.ok)return null;
  const j=await r.json();
  if(j.responseStatus===200&&j.responseData?.translatedText){
    const t=j.responseData.translatedText;
    if(t===t.toUpperCase()&&t.length>2)return null;
    return t;
  }
  return null;
}
let toastTimer=null;
function showToast(msg,duration=3000){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:8px 18px;border-radius:20px;font-size:13px;z-index:200;pointer-events:none;transition:opacity .2s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.style.opacity='0';},duration);
}

function scoreColor(i){
  // Color based on combined worst score across both directions
  const sAB=scores.ab[i];const sBA=scores.ba[i];
  const vals=[sAB,sBA].filter(v=>v!==undefined);
  if(!vals.length)return'var(--border-strong)';
  const worst=Math.min(...vals);
  return worst===0?'var(--danger)':worst===1?'var(--warning)':'var(--success)';
}
function checkAnswer(guess,answer){
  guess=guess.trim().toLowerCase();
  const parts=answer.split('/').map(p=>p.trim().toLowerCase());
  return parts.includes(guess)||guess===parts.join(' / ')||guess===parts.join('/');
}
function getColA(){return colA.trim()||T.col_a;}
function getColB(){return colB.trim()||T.col_b;}
function currentScores(){return scores[dir];}

// ── Persist progress ──────────────────────────────────────────────────────────
function persistProgress(){
  if(currentDeckId===null)return;
  savedDecks[currentDeckId].scores=JSON.parse(JSON.stringify(scores));
  localStorage.setItem('fc_decks',JSON.stringify(savedDecks));
}

// ── Pages ─────────────────────────────────────────────────────────────────────
function showPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('tab-'+p).classList.add('on');
  if(p==='study'&&!studyStarted)startStudy();
  if(p==='deck')renderTable();
}

// ── Deck ──────────────────────────────────────────────────────────────────────
function renderDecks(){
  const el=document.getElementById('decks-list');
  if(!savedDecks.length){el.innerHTML=`<div class="no-decks">${T.no_decks}</div>`;return;}
  el.innerHTML=`<div class="decks-grid">${savedDecks.map((d,i)=>{
    const isActive=i===currentDeckId;
    const sc=d.scores||{ab:{},ba:{}};
    const allDirs=[...Object.values(sc.ab||{}),...Object.values(sc.ba||{})];
    const rated=allDirs.filter(v=>v!==undefined).length;
    const good=allDirs.filter(v=>v===2).length;
    const pct=rated?Math.round(good/d.cards.length*100):0;
    return`<div class="deck-card${isActive?' active-deck':''}" onclick="loadDeck(${i})">
      <div class="deck-card-name">${esc(d.name)}</div>
      <div class="deck-card-count">${T.n(d.cards.length)}${rated?` · ${pct}% ${T.good||'perfect'}`:''}  </div>
      <button class="deck-card-del" onclick="event.stopPropagation();deleteDeck(${i})" title="${T.del}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
  }).join('')}</div>`;
}
function renderTable(){
  const q=(document.getElementById('search-inp').value||'').toLowerCase();
  const ca=document.getElementById('col-a-inp');const cb=document.getElementById('col-b-inp');
  if(ca&&!ca.matches(':focus')&&!colA)ca.placeholder=T.col_a;
  if(cb&&!cb.matches(':focus')&&!colB)cb.placeholder=T.col_b;
  document.getElementById('table-body').innerHTML=cards.map((c,i)=>{
    if(q&&!c.a.toLowerCase().includes(q)&&!c.b.toLowerCase().includes(q))return'';
    return`<div class="tr">
      <div style="display:flex;align-items:center;justify-content:center"><div class="score-dot" style="background:${scoreColor(i)}"></div></div>
      <input value="${esc(c.a)}" placeholder="${getColA()}…" oninput="cards[${i}].a=this.value;updateNav()">
      <input value="${esc(c.b)}" placeholder="${getColB()}…" oninput="cards[${i}].b=this.value;updateNav()">
      <div class="row-acts"><button class="icon-btn" onclick="removeCard(${i})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></button></div>
    </div>`;
  }).join('');
  updateNav();

}
function updateNav(){document.getElementById('nav-count').textContent=T.n(valid().length);}
function updateResetBtn(){
  const btn=document.getElementById('reset-btn');
  if(!btn)return;
  const hasProgress=Object.keys(scores.ab).length||Object.keys(scores.ba).length;
  btn.style.display=hasProgress?'flex':'none';
}
function addCard(){cards.push({a:'',b:''});renderTable();const inp=document.querySelectorAll('.tr input');inp[inp.length-2]?.focus();}
function removeCard(i){if(cards.length>1){cards.splice(i,1);delete scores.ab[i];delete scores.ba[i];renderTable();}}
function togglePaste(){const p=document.getElementById('paste-panel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')document.getElementById('paste-ta').focus();}
function doImport(){
  const raw=document.getElementById('paste-ta').value.trim();if(!raw)return;
  raw.split('\n').forEach(l=>{l=l.trim();if(!l)return;const sep=l.includes('\t')?'\t':l.includes('—')?'—':'-';const p=l.split(sep);if(p.length>=2)cards.push({a:p[0].trim(),b:p.slice(1).join(sep).trim()});});
  document.getElementById('paste-ta').value='';togglePaste();renderTable();
}
function resetProgress(){
  scores={ab:{},ba:{}};history=[];studyStarted=false;
  persistProgress();renderTable();renderDecks();showToast(T.progress_reset||'Progress reset');
}

// ── Save / Load ───────────────────────────────────────────────────────────────
function showSaveModal(){document.getElementById('ms-input').value='';openModal('modal-save');setTimeout(()=>document.getElementById('ms-input').focus(),80);}
function confirmSave(){
  const name=document.getElementById('ms-input').value.trim();if(!name)return;
  // Save with current scores
  savedDecks.unshift({name,cards:JSON.parse(JSON.stringify(cards)),colA,colB,scores:JSON.parse(JSON.stringify(scores))});
  currentDeckId=0;
  localStorage.setItem('fc_decks',JSON.stringify(savedDecks));
  closeModal('modal-save');renderDecks();
}
function loadDeck(i){
  // Save current progress back to its deck first
  persistProgress();
  const d=savedDecks[i];
  cards=JSON.parse(JSON.stringify(d.cards));
  // Restore per-direction scores if present
  scores=d.scores?JSON.parse(JSON.stringify(d.scores)):{ab:{},ba:{}};
  if(!scores.ab)scores.ab={};if(!scores.ba)scores.ba={};
  currentDeckId=i;
  studyStarted=false;history=[];
  colA=d.colA||'';colB=d.colB||'';
  const ca=document.getElementById('col-a-inp');const cb=document.getElementById('col-b-inp');
  if(ca)ca.value=colA;if(cb)cb.value=colB;
  renderTable();renderDecks();
}
function deleteDeck(i){
  if(currentDeckId===i)currentDeckId=null;
  else if(currentDeckId>i)currentDeckId--;
  savedDecks.splice(i,1);
  localStorage.setItem('fc_decks',JSON.stringify(savedDecks));
  renderDecks();
}

// ── Share ─────────────────────────────────────────────────────────────────────
function encode(c){return btoa(unescape(encodeURIComponent(JSON.stringify(c))));}
function decode(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))));}catch(e){return null;}}
function applyImportedDeck(importedCards,importedColA,importedColB){
  cards=importedCards;scores={ab:{},ba:{}};studyStarted=false;history=[];currentDeckId=null;
  colA=importedColA||'';colB=importedColB||'';
  const ca=document.getElementById('col-a-inp');const cb=document.getElementById('col-b-inp');
  if(ca)ca.value=colA;if(cb)cb.value=colB;
  renderTable();renderDecks();
}
async function showShareModal(){
  const codeEl=document.getElementById('share-code');
  document.getElementById('copy-hint').textContent='';
  codeEl.textContent='…';
  openModal('modal-share');
  try{
    const id=await saveDeckToCloud();
    codeEl.textContent=id;
  }catch(e){
    codeEl.textContent=encode({cards,colA,colB});
  }
}
function copyCode(){navigator.clipboard.writeText(document.getElementById('share-code').textContent).then(()=>{document.getElementById('copy-hint').textContent=T.copied;setTimeout(()=>document.getElementById('copy-hint').textContent='',2200);});}
function showImportModal(){document.getElementById('mi-input').value='';document.getElementById('mi-error').textContent='';openModal('modal-import');setTimeout(()=>document.getElementById('mi-input').focus(),80);}
async function confirmImport(){
  const raw=document.getElementById('mi-input').value.trim();
  if(!raw)return;
  document.getElementById('mi-error').textContent='';
  const cloudId=extractCloudId(raw);
  if(cloudId){
    try{
      const data=await loadDeckFromCloud(cloudId);
      if(data){applyImportedDeck(data.cards,data.colA,data.colB);closeModal('modal-import');return;}
    }catch(e){}
  }
  const decoded=decode(raw);
  let importedCards=null,importedColA='',importedColB='';
  if(Array.isArray(decoded)&&decoded[0]?.a){importedCards=decoded;}
  else if(decoded?.cards&&Array.isArray(decoded.cards)&&decoded.cards[0]?.a){importedCards=decoded.cards;importedColA=decoded.colA||'';importedColB=decoded.colB||'';}
  if(!importedCards){document.getElementById('mi-error').textContent=T.ic_err;return;}
  applyImportedDeck(importedCards,importedColA,importedColB);
  closeModal('modal-import');
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-bg.open').forEach(m=>m.classList.remove('open'));});
document.querySelectorAll('.modal-bg').forEach(bg=>bg.addEventListener('click',e=>{if(e.target===bg)bg.classList.remove('open');}));
document.getElementById('ms-input').addEventListener('keydown',e=>{if(e.key==='Enter')confirmSave();});

// ── Queue builder with spacing guarantee ──────────────────────────────────────
const MIN_GAP=3;
function buildQueue(){
  const v=valid();
  const sc=currentScores();
  const weighted=[];
  v.forEach((_,i)=>{
    const s=sc[i];
    const times=s===undefined?2:s===0?MULT.bad:s===1?MULT.ok:MULT.good;
    for(let x=0;x<times;x++)weighted.push(i);
  });
  for(let i=weighted.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[weighted[i],weighted[j]]=[weighted[j],weighted[i]];}
  return spacedShuffle(weighted,MIN_GAP);
}
function spacedShuffle(pool,gap){
  const remaining=[...pool];const result=[];const recentWindow=[];
  while(remaining.length>0){
    let placed=false;
    for(let i=0;i<remaining.length;i++){
      if(!recentWindow.includes(remaining[i])){
        result.push(remaining[i]);recentWindow.push(remaining[i]);
        if(recentWindow.length>gap)recentWindow.shift();
        remaining.splice(i,1);placed=true;break;
      }
    }
    if(!placed){
      result.push(remaining[0]);recentWindow.push(remaining[0]);
      if(recentWindow.length>gap)recentWindow.shift();remaining.splice(0,1);
    }
  }
  return result;
}

function startStudy(){
  const v=valid();
  if(!v.length){document.getElementById('study-inner').innerHTML=`<div class="empty-study"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg><p>${T.empty}</p></div>`;return;}
  studyStarted=true;queue=buildQueue();qi=0;flipped=false;history=[];
  sessionScores={bad:0,ok:0,good:0};renderStudy();
}

// ── Study render ──────────────────────────────────────────────────────────────
const RHTML=()=>`<div class="rating-row">
  <button class="rb rb-bad" onclick="rate('bad')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg><span class="rb-label">${T.bad}</span></button>
  <button class="rb rb-ok" onclick="rate('ok')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="rb-label">${T.ok}</span></button>
  <button class="rb rb-good" onclick="rate('good')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span class="rb-label">${T.good}</span></button>
</div>`;

function renderStudy(){
  if(qi>=queue.length){renderFinish();return;}
  const v=valid();const c=v[queue[qi]];
  const front=dir==='ab'?c.a:c.b;const back=dir==='ab'?c.b:c.a;
  const fL=dir==='ab'?getColA():getColB();const bL=dir==='ab'?getColB():getColA();
  const total=queue.length;
  const canGoBack=history.length>0;
  const sc=currentScores();
  const dots=queue.slice(0,Math.min(total,60)).map((idx,i)=>{
    let cls='dot';
    if(i===qi)cls+=' cur';
    else if(sc[idx]!==undefined)cls+=' s-'+(sc[idx]===0?'bad':sc[idx]===1?'ok':'good');
    return`<div class="${cls}"></div>`;
  }).join('');
  const typeH=mode==='type'?`<div class="type-area"><input class="type-in" id="ti" placeholder="${bL}…" onkeydown="if(event.key==='Enter')chkType()"><button class="type-chk" onclick="chkType()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> ${T.check}</button></div><div class="type-fb" id="tfb"></div>`:'';
  const iconFlip=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>`;
  const iconType=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 11h8M8 15h5"/></svg>`;
  const iconBack=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;

  document.getElementById('study-inner').innerHTML=`
  <div class="study-controls">
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <div class="tog">
        <button id="dir-ab-btn" class="tog-btn${dir==='ab'?' on':''}" onclick="setDir('ab')">${getColA()} → ${getColB()}</button>
        <button id="dir-ba-btn" class="tog-btn${dir==='ba'?' on':''}" onclick="setDir('ba')">${getColB()} → ${getColA()}</button>
      </div>
      <div class="tog">
        <button class="tog-btn${mode==='flip'?' on':''}" onclick="setMode('flip')">${iconFlip} ${T.flip}</button>
        <button class="tog-btn${mode==='type'?' on':''}" onclick="setMode('type')">${iconType} ${T.type}</button>
      </div>
    </div>
    <div class="ctrl-r">
      <button class="sm-btn" onclick="goBack()" ${canGoBack?'':'disabled'} style="${canGoBack?'':'opacity:.35;cursor:default'}">${iconBack} ${T.back||'Back'}</button>
      <button class="sm-btn" onclick="startStudy()">${iconFlip} ${T.restart}</button>
      <span class="prog">${qi+1} / ${total}</span>
    </div>
  </div>
  <div class="card-area" onclick="flipCard()">
    <div class="card-wrap${flipped?' flipped':''}" id="cw">
      <div class="face front"><div class="face-tag">${esc(fL)}</div><div class="face-word">${esc(front)}</div>${mode==='flip'?`<div class="face-hint">${T.click_flip}</div>`:''}</div>
      <div class="face back"><div class="face-tag">${esc(bL)}</div><div class="face-word">${esc(back)}</div></div>
    </div>
  </div>
  ${typeH}
  <div id="rating-area">${flipped||mode==='type'?RHTML():`<div class="pending-msg">${T.wait_flip}</div>`}</div>
  <div class="legend">
    <span><span class="ldot" style="background:var(--danger)"></span>${T.leg_bad}</span>
    <span><span class="ldot" style="background:var(--warning)"></span>${T.leg_ok}</span>
    <span><span class="ldot" style="background:var(--success)"></span>${T.leg_good}</span>
  </div>
  <div class="dots">${dots}</div>`;
  if(mode==='type')document.getElementById('ti')?.focus();
}

function flipCard(){
  if(mode!=='flip')return;
  flipped=!flipped;
  document.getElementById('cw')?.classList.toggle('flipped',flipped);
  if(flipped){const ra=document.getElementById('rating-area');if(ra)ra.innerHTML=RHTML();}
}
function rate(r){
  const cardIdx=queue[qi];
  const prevScore=currentScores()[cardIdx];
  // Push to history so we can undo
  history.push({qi,cardIdx,prevScore,dir,sessionBad:sessionScores.bad,sessionOk:sessionScores.ok,sessionGood:sessionScores.good});
  currentScores()[cardIdx]=SCORE[r];
  sessionScores[r]++;
  persistProgress();
  qi++;flipped=false;
  renderStudy();
}
function goBack(){
  if(!history.length)return;
  const h=history.pop();
  // Restore state
  qi=h.qi;dir=h.dir;flipped=false;
  if(h.prevScore===undefined)delete currentScores()[h.cardIdx];
  else currentScores()[h.cardIdx]=h.prevScore;
  sessionScores={bad:h.sessionBad,ok:h.sessionOk,good:h.sessionGood};
  persistProgress();
  renderStudy();
  // Sync direction toggle buttons
  const ab=document.getElementById('dir-ab-btn');const ba=document.getElementById('dir-ba-btn');
  if(ab)ab.classList.toggle('on',dir==='ab');if(ba)ba.classList.toggle('on',dir==='ba');
}
function setDir(d){
  if(d===dir)return;
  // Save current scores before switching
  persistProgress();
  dir=d;flipped=false;history=[];
  // Start fresh session for this direction (but keep all scores)
  sessionScores={bad:0,ok:0,good:0};
  studyStarted=false;
  startStudy();
}
function setMode(m){mode=m;flipped=false;renderStudy();}
function chkType(){
  const v=valid();const c=v[queue[qi]];const ans=dir==='ab'?c.b:c.a;
  const inp=document.getElementById('ti');const fb=document.getElementById('tfb');
  if(!inp||!fb||!inp.value.trim())return;
  if(checkAnswer(inp.value,ans)){
    inp.className='type-in ok';fb.innerHTML=`<span style="color:var(--success)">✓ ${T.correct}</span>`;
    setTimeout(()=>{const ra=document.getElementById('rating-area');if(ra)ra.innerHTML=RHTML();},500);
  } else {
    inp.className='type-in no';fb.innerHTML=`<span style="color:var(--danger)">✗ ${T.wrong} <strong>${esc(ans)}</strong></span>`;
    setTimeout(()=>{const ra=document.getElementById('rating-area');if(ra)ra.innerHTML=RHTML();},900);
  }
}
function renderFinish(){
  document.getElementById('study-inner').innerHTML=`<div class="finish">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    <h3>${T.done}</h3><p>${T.done_sub}</p>
    <div class="stats-g">
      <div class="stat"><div class="stat-n" style="color:var(--danger)">${sessionScores.bad}</div><div class="stat-l">${T.bad}</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--warning)">${sessionScores.ok}</div><div class="stat-l">${T.ok}</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--success)">${sessionScores.good}</div><div class="stat-l">${T.good}</div></div>
    </div>
    <button class="big-btn" onclick="startStudy()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg> ${T.next}</button>
  </div>`;}

// ── Init ──────────────────────────────────────────────────────────────────────
initTheme();applyI18n();renderDecks();renderTable();
maybeLoadSharedDeckFromURL();
document.getElementById('col-a-inp').placeholder=T.col_a;
document.getElementById('col-b-inp').placeholder=T.col_b;
</script></body></html>
